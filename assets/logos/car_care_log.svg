<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="car_care_log logo">
  <defs>
    <linearGradient id="bg_car_care_log" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#455A64"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <radialGradient id="glow_car_care_log" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow_car_care_log" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg_car_care_log)"/>
  <circle cx="256" cy="266" r="180" fill="url(#glow_car_care_log)"/>
  <text x="256" y="320" text-anchor="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Twemoji Mozilla, EmojiOne Color, Symbola, sans-serif"
        font-size="280" filter="url(#shadow_car_care_log)">🛢</text>
</svg>
