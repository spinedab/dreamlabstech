<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="receipt_splitter logo">
  <defs>
    <linearGradient id="bg_receipt_splitter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
    <radialGradient id="glow_receipt_splitter" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow_receipt_splitter" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg_receipt_splitter)"/>
  <circle cx="256" cy="266" r="180" fill="url(#glow_receipt_splitter)"/>
  <text x="256" y="320" text-anchor="middle"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, Twemoji Mozilla, EmojiOne Color, Symbola, sans-serif"
        font-size="280" filter="url(#shadow_receipt_splitter)">🧾</text>
</svg>
